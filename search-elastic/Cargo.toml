[package]
name = "search-elastic"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
elasticsearch = { version = "9.0.0-alpha.1", default-features = false, features = ["rustls-tls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
futures = "0.3"
thiserror = "1.0"
log = { workspace = true }
env_logger = "0.11"

# Golem component helpers (used only when building the component).
golem-llm = { path = "../llm", version = "0.0.0", default-features = false, optional = true }
golem-rust = { workspace = true, optional = true }
wit-bindgen-rt = { workspace = true, optional = true }

[features]
# Enabled by default for the native host build (tests) – no extra features.
default = []

# Feature that is automatically enabled by `cargo component build` when targeting
# WebAssembly component artifacts. It pulls in the additional dependencies that
# are only required in that environment.
component = ["golem-llm", "golem-rust", "wit-bindgen-rt"]

[package.metadata.component]
package = "golem:search-elastic"

[package.metadata.component.bindings]
generate_unused_types = true

[package.metadata.component.bindings.with]
# Re-export the WIT types generated by `wit-bindgen` so that other components
# can easily depend on this one without having to regenerate the bindings.
"golem:search/search@1.0.0" = "golem_search::golem::search::search"

[package.metadata.component.target]
path = "wit"

[package.metadata.component.target.dependencies]
"golem:search" = { path = "wit" }
"wasi:io" = { path = "wit/deps/wasi:io" }

[dev-dependencies]
# Community maintained Testcontainers modules – we use the Elasticsearch image for real integration tests.
# The "blocking" feature allows us to use the convenient `start()` helper from synchronous test code.
testcontainers-modules = { version = "0.12", default-features = false, features = ["elastic_search", "blocking"] }
